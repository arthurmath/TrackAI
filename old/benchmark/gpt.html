<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trackmania-style Racing</title>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Inter, system-ui, sans-serif;
        }

        #game {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            color: white;
            text-shadow: 0 2px 12px rgba(0, 0, 0, .6);
        }

        .topbar,
        .subbar {
            position: absolute;
            left: 24px;
            display: flex;
            gap: 18px;
            font-weight: 700;
            letter-spacing: .04em;
        }

        .topbar {
            top: 18px;
            right: 24px;
            justify-content: space-between;
        }

        .subbar {
            top: 58px;
        }

        .speedwrap {
            position: absolute;
            right: 26px;
            bottom: 26px;
            display: grid;
            place-items: center;

        #hud-speed {
            margin-top: -76px;
            font-size: 20px;
            font-weight: 800;
        }

        #hud-pause {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: 72px;
            font-weight: 900;
            opacity: .9;
        }

        #hud-tip {
            position: absolute;
            left: 24px;
            bottom: 22px;
            opacity: .8;
            font-size: 14px;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <canvas id="game"></canvas>
    <div id="hud">
        <div class="topbar">
            <div id="hud-lap">LAP 1/3</div>
            <div id="hud-time">00:00.000</div>
        </div>
        <div class="subbar">
            <div id="hud-best">BEST --:--.---</div>
            <div id="hud-delta">△ ---.---</div>
        </div>
        <div class="speedwrap">
            <svg width="110" height="110" viewBox="0 0 110 110">
                <circle cx="55" cy="55" r="42" stroke="rgba(255,255,255,0.14)" stroke-width="10" fill="none" />
                <circle id="hud-speed-ring" cx="55" cy="55" r="42" stroke="rgba(120,220,255,0.95)" stroke-width="10"
                    fill="none" stroke-linecap="round" transform="rotate(-90 55 55)"
                    style="stroke-dasharray:0 263.893;" />
                <circle id="hud-speed-fill" cx="55" cy="55" r="42" stroke="rgba(255,255,255,0.95)" stroke-width="10"
                    fill="none" stroke-linecap="round" transform="rotate(-90 55 55)" style="opacity:0.0;" />
            </svg>
            <div id="hud-speed">0 km/h</div>
        </div>
        <div id="hud-pause">PAUSE</div>
        <div id="hud-tip"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';
        import { AfterimagePass } from 'three/examples/jsm/postprocessing/AfterimagePass.js';

        const ROAD_SURFACE_Y = 0.08;

        const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
        const lerp = (a, b, t) => a + (b - a) * t;
        const smoothstep = (edge0, edge1, x) => {
            const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
            return t * t * (3 - 2 * t);
        };
        const lerpAngle = (a, b, t) => {
            let delta = ((b - a + Math.PI) % (Math.PI * 2)) - Math.PI;
            if (delta < -Math.PI) delta += Math.PI * 2;
            return a + delta * t;
        };
        const formatTime = (ms) => {
            const safe = Math.max(0, ms);
            const m = Math.floor(safe / 60000);
            const s = Math.floor((safe % 60000) / 1000);
            const milli = Math.floor(safe % 1000);
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(milli).padStart(3, '0')}`;
        };

        class Input {
            keys = {};

            constructor() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                    if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(e.key.toLowerCase())) {
                        e.preventDefault();
                    }
                });
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });
            }

            down(...names) {
                return names.some((n) => !!this.keys[n.toLowerCase()]);
            }
        }

        class TrackNode {
            constructor(position, width = 14, banking = 0) {
                this.position = position;
                this.width = width;
                this.banking = banking;
            }
        }

        class Track {
            group = new THREE.Group();
            centerline;
            points;
            nodes;
            totalLength = 0;

            checkpointMeshes = [];
            startLineX = 0;
            startLineNormal = new THREE.Vector3(0, 0, 1);

            constructor(scene) {
                this.nodes = this.buildNodes();
                this.points = this.nodes.map((n) => n.position.clone());
                this.centerline = new THREE.CatmullRomCurve3(this.points, true, 'catmullrom', 0.35);
                this.totalLength = this.computeLength();

                this.buildRoad();
                this.buildScenery();
                scene.add(this.group);
            }

            buildNodes() {
                const raw = [
                    [0, 0, 0, 16, 0],
                    [120, 0, 10, 16, 0.05],
                    [180, 0, 70, 14, 0.1],
                    [170, 0, 160, 14, 0.12],
                    [100, 0, 220, 15, 0.08],
                    [10, 0, 240, 16, 0],
                    [-90, 0, 210, 14, -0.08],
                    [-150, 0, 140, 13, -0.12],
                    [-170, 0, 40, 12, -0.15],
                    [-120, 0, -50, 13, -0.05],
                    [-30, 0, -90, 14, 0],
                    [60, 0, -70, 15, 0.05],
                ];
                return raw.map((r) => new TrackNode(new THREE.Vector3(r[0], r[1], r[2]), r[3] ?? 14, r[4] ?? 0));
            }

            computeLength() {
                let length = 0;
                const samples = 900;
                let prev = this.centerline.getPointAt(0);
                for (let i = 1; i <= samples; i++) {
                    const p = this.centerline.getPointAt(i / samples);
                    length += p.distanceTo(prev);
                    prev = p;
                }
                return length;
            }

            buildRoad() {
                const roadY = ROAD_SURFACE_Y;
                const roadSamples = 600;
                const roadGeom = new THREE.BufferGeometry();
                const positions = [];
                const normals = [];
                const uvs = [];
                const indices = [];

                const lefts = [];
                const rights = [];

                for (let i = 0; i <= roadSamples; i++) {
                    const t = i / roadSamples;
                    const p = this.centerline.getPointAt(t);
                    const tangent = this.centerline.getTangentAt(t).normalize();
                    const up = new THREE.Vector3(0, 1, 0);
                    const right = new THREE.Vector3().crossVectors(tangent, up).normalize();
                    const width = lerp(12, 16, 0.5 + 0.5 * Math.sin(t * Math.PI * 2 * 2));
                    const left = p.clone().addScaledVector(right, -width);
                    const r = p.clone().addScaledVector(right, width);
                    lefts.push(left);
                    rights.push(r);
                }

                for (let i = 0; i <= roadSamples; i++) {
                    const t = i / roadSamples;
                    const l = lefts[i];
                    const r = rights[i];
                    positions.push(l.x, l.y + roadY, l.z, r.x, r.y + roadY, r.z);
                    normals.push(0, 1, 0, 0, 1, 0);
                    uvs.push(0, t * 30, 1, t * 30);
                }

                for (let i = 0; i < roadSamples; i++) {
                    const base = i * 2;
                    indices.push(base, base + 1, base + 2, base + 2, base + 1, base + 3);
                }

                roadGeom.setIndex(indices);
                roadGeom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                roadGeom.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
                roadGeom.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
                roadGeom.computeVertexNormals();

                const roadMat = new THREE.MeshStandardMaterial({
                    color: 0x2b2f35,
                    roughness: 0.95,
                    metalness: 0.02,
                });
                const road = new THREE.Mesh(roadGeom, roadMat);
                road.receiveShadow = true;
                this.group.add(road);

                const stripeGeom = new THREE.BufferGeometry();
                const stripePos = [];
                const stripeIndices = [];
                const stripeUvs = [];
                const stripeW = 0.45;
                const stripeY = roadY + 0.03;
                for (let i = 0; i <= roadSamples; i++) {
                    const t = i / roadSamples;
                    const p = this.centerline.getPointAt(t);
                    const tangent = this.centerline.getTangentAt(t).normalize();
                    const right = new THREE.Vector3().crossVectors(tangent, new THREE.Vector3(0, 1, 0)).normalize();
                    const l = p.clone().addScaledVector(right, -stripeW);
                    const r = p.clone().addScaledVector(right, stripeW);
                    l.y += stripeY;
                    r.y += stripeY;
                    stripePos.push(l.x, l.y, l.z, r.x, r.y, r.z);
                    stripeUvs.push(0, t * 15, 1, t * 15);
                }
                for (let i = 0; i < roadSamples; i++) {
                    const base = i * 2;
                    stripeIndices.push(base, base + 1, base + 2, base + 2, base + 1, base + 3);
                }
                stripeGeom.setIndex(stripeIndices);
                stripeGeom.setAttribute('position', new THREE.Float32BufferAttribute(stripePos, 3));
                stripeGeom.setAttribute('uv', new THREE.Float32BufferAttribute(stripeUvs, 2));
                stripeGeom.computeVertexNormals();
                const stripeMat = new THREE.MeshStandardMaterial({ color: 0xf3f5f7, roughness: 0.7, metalness: 0.0 });
                const stripe = new THREE.Mesh(stripeGeom, stripeMat);
                stripe.receiveShadow = true;
                this.group.add(stripe);

                const startT = 0.01;
                const startP = this.centerline.getPointAt(startT);
                const startTan = this.centerline.getTangentAt(startT).normalize();
                const startRight = new THREE.Vector3().crossVectors(startTan, new THREE.Vector3(0, 1, 0)).normalize();
                this.startLineNormal.copy(startTan).normalize();
                this.startLineX = startP.x;

                const gate = new THREE.Group();
                const postMat = new THREE.MeshStandardMaterial({ color: 0xe53935, roughness: 0.55, metalness: 0.2, emissive: 0x330000 });
                const topMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.35, metalness: 0.15, emissive: 0x111111 });
                const postGeom = new THREE.BoxGeometry(0.9, 6, 0.9);
                const topGeom = new THREE.BoxGeometry(18, 0.8, 1.2);
                const leftPost = new THREE.Mesh(postGeom, postMat);
                const rightPost = new THREE.Mesh(postGeom, postMat);
                const topBar = new THREE.Mesh(topGeom, topMat);
                leftPost.position.set(-8, 3, 0);
                rightPost.position.set(8, 3, 0);
                topBar.position.set(0, 6, 0);
                gate.add(leftPost, rightPost, topBar);
                gate.position.copy(startP).addScaledVector(startTan, -2.5);
                gate.position.y = 0;
                gate.rotation.y = Math.atan2(startTan.x, startTan.z);
                gate.traverse((o) => {
                    if (o.isMesh) {
                        o.castShadow = true;
                        o.receiveShadow = true;
                    }
                });
                this.group.add(gate);

                const checkpointTs = [0.12, 0.23, 0.34, 0.46, 0.58, 0.69, 0.80, 0.91];
                checkpointTs.forEach((t, i) => {
                    const p = this.centerline.getPointAt(t);
                    const tan = this.centerline.getTangentAt(t).normalize();
                    const cpGate = this.createCheckpointGate(i % 2 === 0 ? 0x15d1ff : 0xffd54f);
                    cpGate.position.copy(p).addScaledVector(tan, -1.8);
                    cpGate.position.y = 0;
                    cpGate.rotation.y = Math.atan2(tan.x, tan.z);
                    this.checkpointMeshes.push(cpGate);
                    this.group.add(cpGate);
                });
            }

            createCheckpointGate(color) {
                const g = new THREE.Group();
                const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.45, metalness: 0.35, emissive: color });
                const barMat = new THREE.MeshStandardMaterial({ color: 0x10131a, roughness: 0.2, metalness: 0.5 });
                const post = new THREE.Mesh(new THREE.BoxGeometry(0.6, 5.2, 0.6), mat);
                const top = new THREE.Mesh(new THREE.BoxGeometry(12, 0.45, 0.9), barMat);
                const left = post.clone();
                const right = post.clone();
                left.position.set(-6, 2.6, 0);
                right.position.set(6, 2.6, 0);
                top.position.set(0, 5.2, 0);
                g.add(left, right, top);
                g.traverse((o) => {
                    if (o.isMesh) {
                        o.castShadow = true;
                    }
                });
                return g;
            }

            buildScenery() {
                const ground = new THREE.Mesh(
                    new THREE.CircleGeometry(700, 80),
                    new THREE.MeshStandardMaterial({ color: 0x48633b, roughness: 1, metalness: 0 })
                );
                ground.rotation.x = -Math.PI / 2;
                ground.position.y = -0.05;
                ground.receiveShadow = true;
                this.group.add(ground);

                const rng = mulberry32(1337);
                for (let i = 0; i < 220; i++) {
                    const angle = rng() * Math.PI * 2;
                    const radius = 160 + rng() * 380;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    const h = 1 + rng() * 9;
                    const w = 2 + rng() * 8;
                    const d = 2 + rng() * 8;
                    const mesh = new THREE.Mesh(
                        new THREE.BoxGeometry(w, h, d),
                        new THREE.MeshStandardMaterial({
                            color: new THREE.Color().setHSL(0.28 + rng() * 0.08, 0.25, 0.22 + rng() * 0.12),
                            roughness: 1,
                            metalness: 0,
                        })
                    );
                    mesh.position.set(x, h / 2 - 0.02, z);
                    mesh.rotation.y = rng() * Math.PI;
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    this.group.add(mesh);
                }

                for (let i = 0; i < 32; i++) {
                    const t = i / 32;
                    const p = this.centerline.getPointAt(t);
                    const tan = this.centerline.getTangentAt(t).normalize();
                    const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0, 1, 0)).normalize();
                    const offset = i % 2 === 0 ? 26 : -26;
                    const base = p.clone().addScaledVector(right, offset);
                    const pole = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.22, 0.3, 12, 8),
                        new THREE.MeshStandardMaterial({ color: 0xbfc7d4, roughness: 0.55, metalness: 0.35 })
                    );
                    pole.position.set(base.x, 6, base.z);
                    pole.castShadow = true;
                    this.group.add(pole);

                    const lamp = new THREE.PointLight(0xaecbff, 1.2, 55, 2.2);
                    lamp.position.set(base.x, 11.3, base.z);
                    this.group.add(lamp);
                }
            }

            findClosestT(position, samples = 300) {
                let bestT = 0;
                let bestDistSq = Infinity;
                let bestPoint = new THREE.Vector3();
                let bestTan = new THREE.Vector3(0, 0, 1);
                for (let i = 0; i <= samples; i++) {
                    const t = i / samples;
                    const p = this.centerline.getPointAt(t);
                    const d = p.distanceToSquared(position);
                    if (d < bestDistSq) {
                        bestDistSq = d;
                        bestT = t;
                        bestPoint = p;
                        bestTan = this.centerline.getTangentAt(t).normalize();
                    }
                }
                return { t: bestT, point: bestPoint, tangent: bestTan, distSq: bestDistSq };
            }
        }

        class Car {
            group = new THREE.Group();
            wheels = [];
            headlights = [];

            position = new THREE.Vector3();
            velocity = new THREE.Vector3();
            forward = new THREE.Vector3(0, 0, 1);
            right = new THREE.Vector3(1, 0, 0);
            up = new THREE.Vector3(0, 1, 0);
            yaw = 0;
            pitch = 0;
            roll = 0;
            steering = 0;
            steerTarget = 0;
            wheelRotation = 0;

            maxSteerRad = THREE.MathUtils.degToRad(26);
            mass = 1180;
            engineForce = 12800;
            brakeForce = 18000;
            dragCoeff = 0.38;
            rollingResistance = 22;
            lateralGrip = 14.5;
            lateralSlipThreshold = 28;
            maxSpeed = 102;
            currentSpeed = 0;
            onGround = true;

            constructor(scene, startPos, startYaw = 0) {
                this.body = this.buildCar();
                this.group.add(this.body);
                this.position.copy(startPos);
                this.yaw = startYaw;
                this.group.position.copy(this.position);
                this.group.rotation.y = this.yaw;
                scene.add(this.group);
            }

            buildCar() {
                const car = new THREE.Group();

                const bodyMat = new THREE.MeshStandardMaterial({
                    color: 0x23a6ff,
                    roughness: 0.22,
                    metalness: 0.62,
                    emissive: 0x04131d,
                });
                const accentMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.35, metalness: 0.2 });
                const glassMat = new THREE.MeshStandardMaterial({ color: 0x1d2f3a, roughness: 0.08, metalness: 0.05, transparent: true, opacity: 0.7 });
                const tireMat = new THREE.MeshStandardMaterial({ color: 0x141414, roughness: 1, metalness: 0 });
                const rimMat = new THREE.MeshStandardMaterial({ color: 0xbfc7d4, roughness: 0.3, metalness: 0.85 });

                const chassis = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.55, 4.3), bodyMat);
                chassis.position.y = 0.72;
                chassis.castShadow = true;
                chassis.receiveShadow = true;
                car.add(chassis);

                const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.65, 1.85), glassMat);
                cabin.position.set(0, 1.18, -0.2);
                cabin.castShadow = true;
                car.add(cabin);

                const nose = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.35, 1.3), accentMat);
                nose.position.set(0, 0.62, 1.45);
                nose.castShadow = true;
                car.add(nose);

                const frontWing = new THREE.Mesh(new THREE.BoxGeometry(2.35, 0.1, 0.45), accentMat);
                frontWing.position.set(0, 0.48, 2.03);
                frontWing.castShadow = true;
                car.add(frontWing);

                const rearWing = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.12, 0.4), accentMat);
                rearWing.position.set(0, 1.32, -1.98);
                rearWing.castShadow = true;
                car.add(rearWing);

                const wingSupports = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.62, 0.12), accentMat);
                const wingSupportL = wingSupports.clone();
                const wingSupportR = wingSupports.clone();
                wingSupportL.position.set(-0.72, 1.02, -1.9);
                wingSupportR.position.set(0.72, 1.02, -1.9);
                car.add(wingSupportL, wingSupportR);

                const wheelGeo = new THREE.CylinderGeometry(0.43, 0.43, 0.35, 18);
                const rimGeo = new THREE.CylinderGeometry(0.23, 0.23, 0.37, 12);
                const wheelPositions = [
                    [-1.02, 0.42, 1.48],
                    [1.02, 0.42, 1.48],
                    [-1.02, 0.42, -1.48],
                    [1.02, 0.42, -1.48],
                ];
                for (const [x, y, z] of wheelPositions) {
                    const wheel = new THREE.Mesh(wheelGeo, tireMat);
                    wheel.rotation.z = Math.PI / 2;
                    wheel.position.set(x, y, z);
                    wheel.castShadow = true;
                    wheel.receiveShadow = true;
                    const rim = new THREE.Mesh(rimGeo, rimMat);
                    rim.rotation.z = Math.PI / 2;
                    rim.position.copy(wheel.position);
                    rim.castShadow = true;
                    car.add(wheel, rim);
                    this.wheels.push(wheel);
                }

                const headLightGeo = new THREE.BoxGeometry(0.22, 0.14, 0.18);
                const headLightMat = new THREE.MeshStandardMaterial({ color: 0xf5f7ff, emissive: 0xdde9ff, emissiveIntensity: 1.7, roughness: 0.2, metalness: 0.0 });
                [-0.62, 0.62].forEach((x) => {
                    const light = new THREE.Mesh(headLightGeo, headLightMat);
                    light.position.set(x, 0.72, 2.04);
                    car.add(light);
                    const spot = new THREE.SpotLight(0xdde9ff, 1.5, 60, Math.PI / 8, 0.5, 1.8);
                    spot.position.set(x, 0.9, 1.92);
                    spot.target.position.set(x, 0.7, 22);
                    car.add(spot, spot.target);
                    this.headlights.push(spot);
                });

                return car;
            }

            reset(pos, yaw) {
                this.position.copy(pos);
                this.velocity.set(0, 0, 0);
                this.yaw = yaw;
                this.roll = 0;
                this.pitch = 0;
                this.steering = 0;
                this.steerTarget = 0;
                this.wheelRotation = 0;
                this.group.position.copy(pos);
                this.group.rotation.set(0, yaw, 0);
            }

            speedMS() {
                return this.velocity.length();
            }

            speedKmh() {
                return this.speedMS() * 3.6;
            }

            update(dt, input, track) {
                const throttle = input.down('z', 'arrowup') ? 1 : 0;
                const reverse = input.down('s', 'arrowdown') ? 1 : 0;
                const left = input.down('q', 'arrowright') ? 1 : 0;
                const right = input.down('d', 'arrowleft') ? 1 : 0;
                const brake = reverse && this.speedMS() > 2 ? 1 : 0;

                const speed = this.speedMS();
                const speedNorm = clamp(speed / 60, 0, 1);

                this.steerTarget = (right - left) * this.maxSteerRad * (1 - 0.58 * speedNorm);
                this.steering = lerpAngle(this.steering, this.steerTarget, 5.0 * dt);

                this.forward.set(Math.sin(this.yaw), 0, Math.cos(this.yaw)).normalize();
                this.right.set(this.forward.z, 0, -this.forward.x).normalize();

                const engineCurve = smoothstep(0, this.maxSpeed * 0.72, speed);
                const acceleration = (throttle > 0 ? this.engineForce * (1 - 0.72 * engineCurve) : 0) / this.mass;
                const brakeAccel = (brake > 0 ? this.brakeForce : 0) / this.mass;
                const reverseAccel = (reverse > 0 && speed < 8 ? this.engineForce * 0.58 : 0) / this.mass;

                const accelForward = (acceleration - brakeAccel) * throttle + reverseAccel * reverse;

                const longitudinal = this.forward.dot(this.velocity);
                const lateral = this.right.dot(this.velocity);

                const turnAuthority = clamp(Math.abs(longitudinal) / 18, 0.25, 1);
                const yawRate = (longitudinal / 6.8) * Math.tan(this.steering) * turnAuthority;
                this.yaw += yawRate * dt;

                this.forward.set(Math.sin(this.yaw), 0, Math.cos(this.yaw)).normalize();
                this.right.set(this.forward.z, 0, -this.forward.x).normalize();

                let newLongitudinal = longitudinal + accelForward * dt;
                newLongitudinal -= Math.sign(newLongitudinal) * (this.rollingResistance + this.dragCoeff * newLongitudinal * newLongitudinal) * dt / this.mass;
                newLongitudinal = clamp(newLongitudinal, -16, this.maxSpeed);

                const gripFactor = clamp(1 - speed / this.lateralSlipThreshold, 0.2, 1);
                const lateralDamping = this.lateralGrip * gripFactor;
                let newLateral = lerp(lateral, 0, clamp(lateralDamping * dt, 0, 1));

                const cornerDemand = Math.abs(this.steering) * speed;
                const slip = smoothstep(15, 60, cornerDemand);
                if (slip > 0.15) {
                    const driftPush = this.right.clone().multiplyScalar((cornerDemand - 20) * 0.0045 * slip);
                    this.velocity.addScaledVector(driftPush, dt * 60);
                }

                this.velocity.copy(this.forward).multiplyScalar(newLongitudinal).addScaledVector(this.right, newLateral);

                this.position.addScaledVector(this.velocity, dt);
                this.position.y = ROAD_SURFACE_Y;

                const targetRoll = clamp(-lateral * 0.035, -0.3, 0.3) + clamp(-this.steering * speed * 0.004, -0.25, 0.25);
                const targetPitch = clamp(-accelForward * 0.02, -0.12, 0.14);
                this.roll = lerp(this.roll, targetRoll, 7 * dt);
                this.pitch = lerp(this.pitch, targetPitch, 5 * dt);

                this.group.position.copy(this.position);
                this.group.rotation.set(this.pitch, this.yaw, this.roll, 'YXZ');

                this.wheelRotation += this.speedMS() * dt * 3.3;
                this.wheels.forEach((wheel, i) => {
                    wheel.rotation.x = this.wheelRotation;
                    const isFront = i < 2;
                    if (isFront) wheel.rotation.y = this.steering;
                });
            }
        }

        class Game {
            input = new Input();
            clock = new THREE.Clock();
            paused = false;
            started = false;

            lapCount = 3;
            currentLap = 1;
            checkpointIndex = 0;
            checkpointOrder = 0;
            startTime = 0;
            lapStartTime = 0;
            currentLapTime = 0;
            bestLap = Infinity;
            bestLapDelta = 0;
            lastCrossTime = 0;
            prevProgress = 0;
            checkpointTs = [0.12, 0.23, 0.34, 0.46, 0.58, 0.69, 0.80, 0.91];

            camPos = new THREE.Vector3();
            camLook = new THREE.Vector3();
            camVel = new THREE.Vector3();
            fovBase = 62;

            constructor() {
                const canvas = document.getElementById('game');
                this.renderer = new THREE.WebGLRenderer({
                    canvas,
                    antialias: true,
                    powerPreference: 'high-performance',
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.outputColorSpace = THREE.SRGBColorSpace;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.1;

                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x87b8e8);
                this.scene.fog = new THREE.Fog(0x87b8e8, 100, 420);

                this.camera = new THREE.PerspectiveCamera(this.fovBase, window.innerWidth / window.innerHeight, 0.1, 1000);

                this.elLap = document.getElementById('hud-lap');
                this.elTime = document.getElementById('hud-time');
                this.elBest = document.getElementById('hud-best');
                this.elDelta = document.getElementById('hud-delta');
                this.elSpeed = document.getElementById('hud-speed');
                this.elPause = document.getElementById('hud-pause');
                this.elLapFill = document.getElementById('hud-speed-fill');
                this.elLapRing = document.getElementById('hud-speed-ring');
                this.elTip = document.getElementById('hud-tip');

                this.addLights();
                this.track = new Track(this.scene);
                const startPos = this.track.centerline.getPointAt(0.01).clone();
                startPos.y = ROAD_SURFACE_Y;
                const startYaw = Math.atan2(this.track.centerline.getTangentAt(0.01).x, this.track.centerline.getTangentAt(0.01).z);
                this.car = new Car(this.scene, startPos, startYaw);

                this.buildPostProcessing();
                this.setupHUD();
                this.bindEvents();

                this.resetRace(true);
                this.animate();
            }

            addLights() {
                const amb = new THREE.AmbientLight(0xc7d8ff, 1.0);
                this.scene.add(amb);

                const sun = new THREE.DirectionalLight(0xfff6df, 3.1);
                sun.position.set(-120, 180, 80);
                sun.castShadow = true;
                sun.shadow.mapSize.set(2048, 2048);
                sun.shadow.camera.left = -220;
                sun.shadow.camera.right = 220;
                sun.shadow.camera.top = 220;
                sun.shadow.camera.bottom = -220;
                sun.shadow.camera.near = 0.5;
                sun.shadow.camera.far = 500;
                this.scene.add(sun);

                const fill = new THREE.DirectionalLight(0x8ab3ff, 0.8);
                fill.position.set(100, 70, -50);
                this.scene.add(fill);
            }

            buildPostProcessing() {
                const renderPass = new RenderPass(this.scene, this.camera);
                this.composer = new EffectComposer(this.renderer);
                this.composer.addPass(renderPass);

                this.bloomPass = new UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth, window.innerHeight),
                    0.55,
                    0.35,
                    0.88
                );
                this.composer.addPass(this.bloomPass);

                this.blurPass = new AfterimagePass();
                this.blurPass.uniforms['damp'].value = 0.1;
                this.composer.addPass(this.blurPass);
            }

            setupHUD() {
                this.elPause.style.display = 'none';
                this.elTip.textContent = 'Z/↑ accélérer · S/↓ freiner · Q/D tourner · R reset · Esc pause';
            }

            bindEvents() {
                window.addEventListener('resize', () => this.onResize());

                window.addEventListener('keydown', (e) => {
                    if (e.key.toLowerCase() === 'r') {
                        this.resetRace(false);
                    }
                    if (e.key === 'Escape') {
                        this.paused = !this.paused;
                        this.elPause.style.display = this.paused ? 'block' : 'none';
                        this.clock.getDelta();
                    }
                });
            }

            resetRace(hard) {
                const startP = this.track.centerline.getPointAt(0.01).clone();
                const startTan = this.track.centerline.getTangentAt(0.01).normalize();
                const yaw = Math.atan2(startTan.x, startTan.z);
                this.car.reset(startP, yaw);
                this.currentLap = 1;
                this.checkpointIndex = 0;
                this.checkpointOrder = 0;
                this.prevProgress = 0;

                const now = performance.now();
                this.startTime = now;
                this.lapStartTime = now;
                this.currentLapTime = 0;

                if (hard) {
                    this.bestLap = Infinity;
                    this.bestLapDelta = 0;
                }
            }

            onResize() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.composer.setSize(window.innerWidth, window.innerHeight);
            }

            updateRaceLogic(now) {
                const progressInfo = this.track.findClosestT(this.car.position, 420);
                const progress = progressInfo.t;

                const checkpointPassed = this.checkpointIndex < this.checkpointTs.length && this.didCrossForward(this.prevProgress, progress, this.checkpointTs[this.checkpointIndex]);
                if (checkpointPassed) {
                    this.checkpointIndex = (this.checkpointIndex + 1) % this.checkpointTs.length;
                    this.checkpointOrder = Math.max(this.checkpointOrder, this.checkpointIndex);
                }

                const startLineCrossed = this.didCrossForward(this.prevProgress, progress, 0.98) || (this.prevProgress > 0.98 && progress < 0.02);
                if (startLineCrossed && this.checkpointIndex === 0 && now - this.lastCrossTime > 5000) {
                    if (this.currentLap >= 1) {
                        const lapTime = now - this.lapStartTime;
                        if (this.bestLap === Infinity || lapTime < this.bestLap) {
                            this.bestLap = lapTime;
                        }
                        this.currentLap += 1;
                        this.lapStartTime = now;
                        this.lastCrossTime = now;
                    }
                }

                const dist = Math.sqrt(progressInfo.distSq);
                if (dist > 38) {
                    const pull = progressInfo.point.clone();
                    pull.y = ROAD_SURFACE_Y;
                    this.car.position.lerp(pull, clamp((dist - 38) * 0.01, 0, 0.08));
                    this.car.velocity.multiplyScalar(0.99);
                }

                this.prevProgress = progress;
                this.currentLapTime = now - this.lapStartTime;

                const best = this.bestLap === Infinity ? '--:--.---' : formatTime(this.bestLap);
                const delta = this.bestLap === Infinity ? 0 : (this.currentLapTime - this.bestLap);
                const sign = delta >= 0 ? '+' : '-';
                const absDelta = Math.abs(delta);

                this.elLap.textContent = `LAP ${Math.min(this.currentLap, this.lapCount)}/${this.lapCount}`;
                this.elTime.textContent = formatTime(this.currentLapTime);
                this.elBest.textContent = `BEST ${best}`;
                this.elDelta.textContent = this.bestLap === Infinity ? '△ ---.---' : `△${sign}${absDelta.toFixed(3).padStart(7, '0')}`;
                this.elSpeed.textContent = `${Math.round(this.car.speedKmh())} km/h`;

                const speedRatio = clamp(this.car.speedKmh() / 360, 0, 1);
                const circumference = 2 * Math.PI * 42;
                const dash = circumference * speedRatio;
                const rest = circumference - dash;
                this.elLapFill.style.strokeDasharray = `${dash} ${rest}`;
            }

            didCrossForward(prevT, currentT, markerT) {
                if (prevT <= currentT) return prevT < markerT && currentT >= markerT;
                return prevT < markerT || currentT >= markerT;
            }

            updateCamera(dt) {
                const speed = this.car.speedMS();
                const speedBlend = clamp(speed / 80, 0, 1);
                this.camera.fov = this.fovBase + speedBlend * 12;
                this.camera.updateProjectionMatrix();

                const behind = this.car.forward.clone().multiplyScalar(-10 - speed * 0.22);
                const up = new THREE.Vector3(0, 4.2 + speed * 0.02, 0);
                const desiredPos = this.car.position.clone().add(behind).add(up);
                const desiredLook = this.car.position.clone().add(this.car.forward.clone().multiplyScalar(14)).add(new THREE.Vector3(0, 1.2, 0));

                this.camPos.lerp(desiredPos, 1 - Math.pow(0.0008, dt));
                this.camLook.lerp(desiredLook, 1 - Math.pow(0.0004, dt));

                this.camera.position.copy(this.camPos);
                this.camera.lookAt(this.camLook);
            }

            animate = () => {
                requestAnimationFrame(this.animate);
                const dt = Math.min(this.clock.getDelta(), 0.033);
                const now = performance.now();

                if (!this.paused) {
                    this.car.update(dt, this.input, this.track);
                    this.updateRaceLogic(now);
                    this.updateCamera(dt);
                }

                this.composer.render();
            };
        }

        function mulberry32(seed) {
            return function () {
                let t = (seed += 0x6d2b79f5);
                t = Math.imul(t ^ (t >>> 15), t | 1);
                t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        window.addEventListener('DOMContentLoaded', () => {
            new Game();
        });
    </script>
</body>
