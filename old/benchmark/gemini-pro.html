<!-- Gemini 3.1 Pro -->

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web3D Racing</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: white;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            z-index: 1;
        }

        #hud {
            position: absolute;
            z-index: 2;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            text-shadow: 1px 1px 2px black;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
        }

        .hud-best {
            text-align: right;
            font-size: 18px;
            opacity: 0.8;
        }

        .hud-bottom {
            align-self: flex-end;
            text-align: right;
            position: relative;
        }

        #speed-text {
            font-size: 32px;
            font-weight: bold;
            font-style: italic;
            margin-bottom: -10px;
        }

        svg {
            overflow: visible;
        }

        .speed-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 10;
            stroke-linecap: round;
        }

        .speed-value {
            fill: none;
            stroke: #00ffcc;
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 204;
            stroke-dashoffset: 204;
            transition: stroke-dashoffset 0.1s linear;
        }

        .delta-positive {
            color: #ff4444;
        }

        .delta-negative {
            color: #44ff44;
        }

        #pause-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 10px;
        }

        .hidden {
            display: none !important;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <div id="game-container"></div>

    <div id="hud">
        <div class="hud-top">
            <div id="lap-counter">LAP 1/3</div>
            <div id="timer">00:00.000</div>
        </div>
        <div class="hud-best">
            BEST <span id="best-time">--:--.---</span>
            <span id="delta-time"></span>
        </div>

        <div class="hud-bottom">
            <div id="speed-text">0 km/h</div>
            <svg width="150" height="80" viewBox="0 0 150 80">
                <path class="speed-bg" d="M 10 70 A 60 60 0 0 1 140 70" />
                <path id="speed-arc" class="speed-value" d="M 10 70 A 60 60 0 0 1 140 70" />
            </svg>
        </div>

        <div id="pause-menu" class="hidden">PAUSED</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';

        const MAX_LAPS = 3;
        const MAX_SPEED = 65;
        const ACCELERATION = 25;
        const BRAKING = 40;
        const FRICTION = 2;
        const LATERAL_FRICTION = 8;

        let isPaused = false;
        let currentLap = 1;
        let startTime = 0;
        let bestTime = Infinity;
        let checkpointsPassed = 0;

        const container = document.getElementById('game-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 300);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(100, 200, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -150;
        dirLight.shadow.camera.right = 150;
        dirLight.shadow.camera.top = 150;
        dirLight.shadow.camera.bottom = -150;
        scene.add(dirLight);

        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.8, 0.85);
        composer.addPass(bloomPass);

        const roadMaterial = new THREE.MeshStandardMaterial({
            color: 0x333333,
            roughness: 0.7,
            metalness: 0.1
        });

        const curve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, 0, 0),
            new THREE.Vector3(0, 0, -100),
            new THREE.Vector3(-50, 5, -150),
            new THREE.Vector3(-150, 10, -150),
            new THREE.Vector3(-200, 0, -50),
            new THREE.Vector3(-100, -5, 50),
            new THREE.Vector3(50, 0, 100),
            new THREE.Vector3(100, 5, 50),
            new THREE.Vector3(50, 0, 0),
            new THREE.Vector3(0, 0, 0)
        ], true);

        // Profile width on Y (not X): ExtrudeGeometry aligns shape X with path tangent.
        const shape = new THREE.Shape();
        shape.moveTo(0, -8);
        shape.lineTo(0, 8);
        shape.lineTo(-0.5, 8);
        shape.lineTo(-0.5, -8);
        shape.closePath();

        const extrudeSettings = { steps: 200, extrudePath: curve, bevelEnabled: false };
        const roadGeometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        const roadMesh = new THREE.Mesh(roadGeometry, roadMaterial);
        roadMesh.receiveShadow = true;
        scene.add(roadMesh);

        const carGroup = new THREE.Group();
        scene.add(carGroup);

        const bodyGeo = new THREE.BoxGeometry(2, 1, 4);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0055, roughness: 0.2, metalness: 0.8 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.7;
        body.castShadow = true;
        carGroup.add(body);

        const taillightGeo = new THREE.BoxGeometry(1.8, 0.2, 0.1);
        const taillightMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const taillight = new THREE.Mesh(taillightGeo, taillightMat);
        taillight.position.set(0, 0.8, 2.05);
        carGroup.add(taillight);

        let position = new THREE.Vector3(0, 1, 0);
        let velocity = new THREE.Vector3();
        let carRotation = 0;
        let steeringAngle = 0;

        const keys = { forward: false, backward: false, left: false, right: false };

        window.addEventListener('keydown', (e) => {
            if (e.key === 'z' || e.key === 'ArrowUp') keys.forward = true;
            if (e.key === 's' || e.key === 'ArrowDown') keys.backward = true;
            if (e.key === 'q' || e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'd' || e.key === 'ArrowRight') keys.right = true;
            if (e.key === 'r') resetCar();
            if (e.key === 'Escape') togglePause();
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'z' || e.key === 'ArrowUp') keys.forward = false;
            if (e.key === 's' || e.key === 'ArrowDown') keys.backward = false;
            if (e.key === 'q' || e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'd' || e.key === 'ArrowRight') keys.right = false;
        });

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-menu').classList.toggle('hidden', !isPaused);
            if (!isPaused) {
                lastTime = performance.now();
                requestAnimationFrame(animate);
            }
        }

        function resetCar() {
            position.set(0, 1, 0);
            velocity.set(0, 0, 0);
            carRotation = Math.PI;
            steeringAngle = 0;
        }

        resetCar();
        startTime = performance.now();

        function formatTime(ms) {
            const d = new Date(ms);
            const m = d.getMinutes().toString().padStart(2, '0');
            const s = d.getSeconds().toString().padStart(2, '0');
            const milli = d.getMilliseconds().toString().padStart(3, '0');
            return `${m}:${s}.${milli}`;
        }

        const uiTimer = document.getElementById('timer');
        const uiLap = document.getElementById('lap-counter');
        const uiSpeed = document.getElementById('speed-text');
        const uiSpeedArc = document.getElementById('speed-arc');
        const uiBest = document.getElementById('best-time');
        const uiDelta = document.getElementById('delta-time');

        let lastTime = performance.now();

        function animate() {
            if (isPaused) return;
            requestAnimationFrame(animate);

            const now = performance.now();
            const dt = Math.min((now - lastTime) / 1000, 0.1);
            lastTime = now;

            const forward = new THREE.Vector3(Math.sin(carRotation), 0, Math.cos(carRotation));
            const right = new THREE.Vector3(Math.cos(carRotation), 0, -Math.sin(carRotation));

            let speed = velocity.dot(forward);
            const lateralSpeed = velocity.dot(right);

            let engineForce = 0;
            if (keys.forward) engineForce = ACCELERATION;
            if (keys.backward) engineForce = -BRAKING;

            taillight.material.color.setHex(keys.backward ? 0xff4444 : 0x330000);

            const speedRatio = Math.abs(speed) / MAX_SPEED;
            const maxSteer = THREE.MathUtils.lerp(0.6, 0.15, speedRatio);
            let targetSteering = 0;
            if (keys.left) targetSteering = maxSteer;
            if (keys.right) targetSteering = -maxSteer;

            steeringAngle = THREE.MathUtils.lerp(steeringAngle, targetSteering, dt * 10);

            if (Math.abs(speed) > 1) {
                const turnRadius = 4;
                carRotation += (speed * Math.sin(steeringAngle) / turnRadius) * dt;
            }

            velocity.add(forward.clone().multiplyScalar(engineForce * dt));
            velocity.sub(forward.clone().multiplyScalar(speed * FRICTION * dt));
            velocity.sub(right.clone().multiplyScalar(lateralSpeed * LATERAL_FRICTION * dt));

            if (velocity.length() > MAX_SPEED) {
                velocity.normalize().multiplyScalar(MAX_SPEED);
            }

            position.add(velocity.clone().multiplyScalar(dt));

            carGroup.position.copy(position);
            carGroup.rotation.y = carRotation;

            const cameraTarget = carGroup.position.clone().add(new THREE.Vector3(0, 3, 0));
            const cameraOffset = forward.clone().multiplyScalar(-8).add(new THREE.Vector3(0, 4, 0));

            camera.position.lerp(carGroup.position.clone().add(cameraOffset), dt * 5);
            camera.lookAt(cameraTarget);

            const targetFov = 60 + (speedRatio * 25);
            camera.fov = THREE.MathUtils.lerp(camera.fov, targetFov, dt * 5);
            camera.updateProjectionMatrix();

            const currentTime = now - startTime;
            uiTimer.innerText = formatTime(currentTime);

            const kmh = Math.abs(Math.round(speed * 3.6));
            uiSpeed.innerText = `${kmh} km/h`;

            const arcOffset = 204 - (Math.min(kmh / 250, 1) * 204);
            uiSpeedArc.style.strokeDashoffset = arcOffset.toString();

            if (position.z < 0 && position.z > -10 && position.x > -20 && position.x < 20 && speed > 5) {
                if (checkpointsPassed > 0) {
                    if (currentTime < bestTime) {
                        bestTime = currentTime;
                        uiBest.innerText = formatTime(bestTime);
                        uiDelta.innerText = "-00:00.000";
                        uiDelta.className = "delta-negative";
                    } else {
                        const diff = currentTime - bestTime;
                        uiDelta.innerText = `+${formatTime(diff).substring(3)}`;
                        uiDelta.className = "delta-positive";
                    }

                    currentLap++;
                    if (currentLap > MAX_LAPS) {
                        isPaused = true;
                        document.getElementById('pause-menu').innerText = "RACE FINISHED";
                        document.getElementById('pause-menu').classList.remove('hidden');
                        return;
                    }

                    uiLap.innerText = `LAP ${currentLap}/${MAX_LAPS}`;
                    startTime = now;
                    checkpointsPassed = 0;
                }
            }

            if (position.z < -100) checkpointsPassed = 1;

            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        requestAnimationFrame(animate);
    </script>
</body>

</html>
