<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Three.js Physics Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
    }

    #info {
      position: absolute;
      top: 14px;
      left: 14px;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      background: rgba(0, 0, 0, 0.45);
      padding: 8px 12px;
      border-radius: 6px;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="info">
    <strong>Arrow keys</strong>: move the blue cube<br>
    <strong>Mouse</strong>: orbit / zoom / pan the camera<br>
    Push <span style="color:#ff6666">red balls</span> around &nbsp;|&nbsp;
    <span style="color:#88ff88">green cubes</span> are immovable
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="scene_rapier.js"></script>
</body>

</html>
